name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image names
        id: image_names
        shell: bash
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          repo=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          repo=$(echo "$repo" | sed -E 's/[^a-z0-9._-]+/-/g; s/^[._-]+//; s/[._-]+$//')
          if [ -z "$repo" ]; then
            repo="app"
          fi

          echo "backend_image=ghcr.io/${owner}/${repo}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner}/${repo}/frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.image_names.outputs.backend_image }}:${{ github.sha }},${{ steps.image_names.outputs.backend_image }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.image_names.outputs.frontend_image }}:${{ github.sha }},${{ steps.image_names.outputs.frontend_image }}:latest

      # Add your deployment step here (kubectl apply, SSH, etc.)
      - name: Notify deployment
        run: echo "Deployed ${{ github.sha }} to production"
