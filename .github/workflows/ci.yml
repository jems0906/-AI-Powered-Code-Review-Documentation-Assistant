name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codereview
          POSTGRES_PASSWORD: password
          POSTGRES_DB: codereview_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U codereview"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run ruff linter
        working-directory: backend
        run: pip install ruff && ruff check .

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://codereview:password@localhost:5432/codereview_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret
          ENVIRONMENT: test
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short || true

  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
